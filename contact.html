<style>
body { font-family: Arial; margin:0; background:#F5F7FA;}

.nav { background:#111; padding:12px 40px; display:flex; align-items:center;}
.logo { height:40px; margin-right:30px;}

.nav a {
color:white;
margin-right:15px;
text-decoration:none;
font-size:15px;
padding:8px 16px;
border-radius:6px;
background:#0F9D8A;
}

.nav a:hover { background:#111;}
.nav a.active { background:#111;}

.container { max-width:1000px; margin:auto; padding:60px 40px; background:white;}

input, textarea {
width:100%;
padding:10px;
margin-bottom:10px;
font-size:14px;
}

.btn {
background:#0F9D8A;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* FOOTER */
.footer { background:#111; color:white; padding:40px; margin-top:60px;}
.footer-content { max-width:1000px; margin:auto; line-height:1.8;}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">
    <img src="logo.png" class="logo">
</a>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="about.html">About</a>
<a href="contact.html" class="active">Contact</a>
</div>

<div class="container">

<h1>Contact Us</h1>

<!-- 表单 -->
<input id="name" placeholder="Name">
<input id="email" placeholder="E-mail address">
<input id="subject" placeholder="Subject">
<input id="message" placeholder="Your message">

<button class="btn" onclick="sendEmail()">Get a Quote</button>

</div>

<div class="footer">
<div class="footer-content">
<strong>KS Procurement</strong><br><br>
Email: info@ksprocurement.com<br>
Phone: +86 195 2142 9711<br>
KvK No.: 42011492<br>
BTW-id No.: NL005432124B24
</div>
</div>

<script>
function sendEmail() {

    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var subject = document.getElementById("subject").value;
    var message = document.getElementById("message").value;

    var mailtoLink = "mailto:info@ksprocurement.com"
        + "?subject=" + encodeURIComponent(subject)
        + "&body=" + encodeURIComponent(
            "Name: " + name + "\n"
            + "Email: " + email + "\n\n"
            + "Message:\n" + message
        );

    window.location.href = mailtoLink;
}
</script>
